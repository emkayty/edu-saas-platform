version: '3.9'

# ============================================================
# UNIVERSITY PORTAL - DOCKER COMPOSE CONFIGURATION
# ============================================================
# This file contains all services required for the portal
# including database, cache, messaging, API, and frontend
# ============================================================

services:
  # ============================================================
  # DATABASE SERVICES
  # ============================================================
  
  postgres_primary:
    image: pgvector/pgvector:pg16
    container_name: university_db_primary
    environment:
      POSTGRES_DB: ${DB_NAME:-university_portal}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - university_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  postgres_replica:
    image: pgvector/pgvector:pg16
    container_name: university_db_replica
    command: postgres -c replica=1 -c hot_standby=on
    environment:
      POSTGRES_DB: ${DB_NAME:-university_portal}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    depends_on:
      postgres_primary:
        condition: service_healthy
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      - university_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    restart: unless-stopped

  # ============================================================
  # CACHE & MESSAGE QUEUE
  # ============================================================
  
  redis:
    image: redis:7-alpine
    container_name: university_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1 --save 300 10
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: university_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/defs.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # REAL-TIME MESSAGING
  # ============================================================
  
  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: university_centrifugo
    environment:
      CENTRIFUGO_SECRET: ${CENTRIFUGO_SECRET:-secret_key_change_in_production}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET:-admin_secret_change_in_production}
      CENTRIFUGO_ADMIN: "true"
      CENTRIFUGO_DATABASE: redis
      CENTRIFUGO_DATABASE_URL: redis://redis:6379
      CENTRIFUGO_PORT: 8001
      CENTRIFUGO_METRICS: "true"
      CENTRIFUGO_LOG_LEVEL: info
    volumes:
      - ./docker/centrifugo/config.yaml:/etc/centrifugo/config.yaml:ro
    ports:
      - "${CENTRIFUGO_PORT:-8001}:8001"
    depends_on:
      - redis
    networks:
      - university_network
    restart: unless-stopped

  # ============================================================
  # BACKEND API
  # ============================================================
  
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: university_api
    environment:
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres_primary:5432/${DB_NAME:-university_portal}
      - DATABASE_REPLICA_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres_replica:5432/${DB_NAME:-university_portal}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672/
      - CENTRIFUGO_URL=http://centrifugo:8001
      - CENTRIFUGO_API_KEY=${CENTRIFUGO_SECRET:-secret_key_change_in_production}
      - SECRET_KEY=${DJANGO_SECRET_KEY:-change_this_secret_key_in_production}
      - ALLOWED_HOSTS=localhost,api,web
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://web:3000
      - EMAIL_HOST=${EMAIL_HOST:-smtp.mailtrap.io}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_TLS=true
      - SMS_API_KEY=${SMS_API_KEY:-}
      - SMS_SENDER=${SMS_SENDER:-UNIVERSITY}
      - JAMB_API_URL=${JAMB_API_URL:-https://caps.jamb.gov.ng/api}
      - JAMB_API_KEY=${JAMB_API_KEY:-}
      - NIMC_API_URL=${NIMC_API_URL:-https://nimc.gov.ng/api}
      - NIMC_API_KEY=${NIMC_API_KEY:-}
      - REMITA_API_KEY=${REMITA_API_KEY:-}
      - REMITA_API_URL=${REMITA_API_URL:-https://remitademo.net}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY:-}
      - FLUTTERWAVE_PUBLIC_KEY=${FLUTTERWAVE_PUBLIC_KEY:-}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - ./apps/api:/app
      - media_data:/app/media
    networks:
      - university_network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: university_celery_worker
    command: celery -A core worker -l info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres_primary:5432/${DB_NAME:-university_portal}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672/
      - SECRET_KEY=${DJANGO_SECRET_KEY:-change_this_secret_key_in_production}
    depends_on:
      - postgres_primary
      - redis
      - rabbitmq
    volumes:
      - ./apps/api:/app
    networks:
      - university_network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: university_celery_beat
    command: celery -A core beat -l info
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres_primary:5432/${DB_NAME:-university_portal}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672/
    depends_on:
      - redis
      - rabbitmq
    volumes:
      - ./apps/api:/app
    networks:
      - university_network
    restart: unless-stopped

  # ============================================================
  # ML SERVICE
  # ============================================================
  
  ml_service:
    build:
      context: .
      dockerfile: apps/ml-service/Dockerfile
      target: production
    container_name: university_ml_service
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres_primary:5432/${DB_NAME:-university_portal}
      - REDIS_URL=redis://redis:6379
      - ML_MODEL_PATH=/models
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "${ML_PORT:-8002}:8002"
    depends_on:
      - postgres_primary
      - redis
    volumes:
      - ml_models:/models
    networks:
      - university_network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped

  # ============================================================
  # FRONTEND
  # ============================================================
  
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: university_web
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_WS_URL=ws://centrifugo:8001
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-University Portal}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
      - centrifugo
    volumes:
      - ./apps/web:/app
      - next_cache:/app/.next
    networks:
      - university_network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  # ============================================================
  # NGINX REVERSE PROXY
  # ============================================================
  
  nginx:
    image: nginx:alpine
    container_name: university_nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - next_cache:/cache
      - media_data:/media:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - web
      - api
    networks:
      - university_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ============================================================
  # MONITORING
  # ============================================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: university_prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - university_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: university_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - university_network
    restart: unless-stopped

  # ============================================================
  # DEVELOPMENT SERVICES
  # ============================================================
  
  mailhog:
    image: mailhog/mailhog:latest
    container_name: university_mailhog
    ports:
      - "${MAILHOG_PORT:-1025}:1025"
      - "${MAILHOG_MAIL_PORT:-8025}:8025"
    networks:
      - university_network
    restart: unless-stopped

  # ============================================================
  # VOLUMES
  # ============================================================
  
volumes:
  postgres_primary_data:
  postgres_replica_data:
  redis_data:
  rabbitmq_data:
  ml_models:
  next_cache:
  media_data:
  grafana_data:
  prometheus_data:

# ============================================================
# NETWORKS
# ============================================================

networks:
  university_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

