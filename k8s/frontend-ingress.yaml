apiVersion: apps/v1
kind: Deployment
metadata:
  name: edusaas-frontend
  namespace: edusaas
  labels:
    app: edusaas-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edusaas-frontend
  template:
    metadata:
      labels:
        app: edusaas-frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: edusaas/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.edusaas.com.ng"
        - name: NEXT_PUBLIC_WS_URL
          value: "wss://api.edusaas.com.ng"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: edusaas-frontend-svc
  namespace: edusaas
spec:
  selector:
    app: edusaas-frontend
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edusaas-ingress
  namespace: edusaas
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
  - hosts:
    - www.edusaas.com.ng
    - api.edusaas.com.ng
    - admin.edusaas.com.ng
    secretName: edusaas-tls-secret
  rules:
  - host: www.edusaas.com.ng
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: edusaas-frontend-svc
            port:
              number: 80
  - host: api.edusaas.com.ng
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: edusaas-backend-svc
            port:
              number: 80
  - host: admin.edusaas.com.ng
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: edusaas-frontend-svc
            port:
              number: 80