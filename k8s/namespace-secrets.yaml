# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: edusaas
  labels:
    name: edusaas
    environment: production
---
# Secrets
apiVersion: v1
kind: Secret
metadata:
  name: edusaas-db-secret
  namespace: edusaas
type: Opaque
stringData:
  host: edusaas-postgres-svc
  port: "5432"
  database: edusaas
  username: edusaas_user
  password: ChangeMeInProduction!2024
---
apiVersion: v1
kind: Secret
metadata:
  name: edusaas-auth-secret
  namespace: edusaas
type: Opaque
stringData:
  jwt-secret: ChangeMeInProduction!2024
  jwt-refresh-secret: ChangeMeInProduction!2024
  encryption-key: ChangeMeInProduction!2024
---
apiVersion: v1
kind: Secret
metadata:
  name: edusaas-remita-secret
  namespace: edusaas
type: Opaque
stringData:
  merchant_id: ""
  api_key: ""
  service_type_id: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: edusaas-jamb-secret
  namespace: edusaas
type: Opaque
stringData:
  institution_code: ""
  api_key: ""
  secret_key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: edusaas-smtp-secret
  namespace: edusaas
type: Opaque
stringData:
  host: smtp.mailtrap.io
  port: "587"
  username: ""
  password: ""
  from-email: noreply@edusaas.com.ng
  from-name: EduSaaS
---
apiVersion: v1
kind: Secret
metadata:
  name: edusaas-sms-secret
  namespace: edusaas
type: Opaque
stringData:
  api_key: ""
  sender_id: EDUSAAS
---
# ConfigMaps
apiVersion: v1
kind: ConfigMap
metadata:
  name: edusaas-config
  namespace: edusaas
data:
  redis_host: "edsaas-redis-svc"
  redis_port: "6379"
  app_url: "https://www.edusaas.com.ng"
  api_url: "https://api.edusaas.com.ng"
  environment: "production"
  timezone: "Africa/Lagos"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: edusaas-quota
  namespace: edusaas
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "50"
    services: "10"
    secrets: "20"
    configmaps: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: edusaas-limits
  namespace: edusaas
spec:
  limits:
  - max:
      cpu: "4"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container