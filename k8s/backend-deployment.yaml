apiVersion: apps/v1
kind: Deployment
metadata:
  name: edusaas-backend
  namespace: edusaas
  labels:
    app: edusaas-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: edusaas-backend
  template:
    metadata:
      labels:
        app: edusaas-backend
        tier: backend
    spec:
      containers:
      - name: backend
        image: edusaas/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 3001
          name: grpc
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: edusaas-db-secret
              key: host
        - name: DB_PORT
          value: "5432"
        - name: DB_DATABASE
          valueFrom:
            secretKeyRef:
              name: edusaas-db-secret
              key: database
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: edusaas-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: edusaas-db-secret
              key: password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: edusaas-auth-secret
              key: jwt-secret
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: edusaas-config
              key: redis_host
        - name: REMITA_MERCHANT_ID
          valueFrom:
            secretKeyRef:
              name: edusaas-remita-secret
              key: merchant_id
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: edusaas-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: edusaas-backend-svc
  namespace: edusaas
spec:
  selector:
    app: edusaas-backend
  ports:
  - name: http
    port: 80
    targetPort: 3000
  - name: grpc
    port: 3001
    targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edusaas-backend-hpa
  namespace: edusaas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edusaas-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80